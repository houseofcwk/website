name = "cwk-contact"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat_v2"]

# Preview / dev defaults (override in env.production)
[vars]
ENVIRONMENT      = "preview"
ALLOWED_ORIGIN   = "https://houseofcwk.pages.dev"
FROM_EMAIL       = "hello@houseofcwk.com"
FROM_NAME        = "CWK. Experience"
REPLY_TO_EMAIL   = "hello@houseofcwk.com"
REPLY_TO_NAME    = "CWK. Team"
CONTACT_INBOX_TO = "hello@houseofcwk.com"
# Leave TURNSTILE_SITE_KEY unset here; injected as a Pages build var client-side.
# RESEND_API, TURNSTILE_SECRET, HASH_SALT are Worker secrets set via
# `wrangler secret put` (never committed).

[[kv_namespaces]]
binding    = "CONTACTS"
id         = "e7ccad6c4f564047af0c8aea9fe0c77d"
preview_id = "07c6ce83f95a4997b0894a69937b461f"

[[kv_namespaces]]
binding    = "RATE_LIMIT"
id         = "24265f0620de4fb7bbb0679676355a01"
preview_id = "3b1956ad390e44409ad62d6fbadf329d"

# Production overrides — deploy with `wrangler deploy --env production`
[env.production]
name = "cwk-contact-prod"
routes = [
  { pattern = "api.houseofcwk.com/contact",         zone_name = "houseofcwk.com" },
  { pattern = "api.houseofcwk.com/contact/healthz", zone_name = "houseofcwk.com" },
]

[env.production.vars]
ENVIRONMENT      = "production"
ALLOWED_ORIGIN   = "https://houseofcwk.com"
FROM_EMAIL       = "hello@houseofcwk.com"
FROM_NAME        = "CWK. Experience"
REPLY_TO_EMAIL   = "hello@houseofcwk.com"
REPLY_TO_NAME    = "CWK. Team"
CONTACT_INBOX_TO = "hello@houseofcwk.com"

[[env.production.kv_namespaces]]
binding = "CONTACTS"
id      = "e7ccad6c4f564047af0c8aea9fe0c77d"

[[env.production.kv_namespaces]]
binding = "RATE_LIMIT"
id      = "24265f0620de4fb7bbb0679676355a01"
