name = "cwk-waitlist"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat_v2"]

# Preview / dev defaults (override in env.production)
[vars]
ENVIRONMENT    = "preview"
ALLOWED_ORIGIN = "https://houseofcwk.pages.dev"
FROM_EMAIL     = "hello@houseofcwk.com"
FROM_NAME      = "CWK. Experience"
REPLY_TO_EMAIL = "hello@houseofcwk.com"
REPLY_TO_NAME  = "Kris San — CWK."

[[kv_namespaces]]
binding    = "WAITLIST"
id         = "1ed95845bab948dd8e276272f98fa74f"
preview_id = "1ed95845bab948dd8e276272f98fa74f"

# Production overrides — deploy with `wrangler deploy --env production`
[env.production]
name = "cwk-waitlist-prod"
# The waitlist worker owns api.houseofcwk.com as a Custom Domain (this also
# auto-creates the proxied DNS record). All requests to the hostname fall
# through to this worker by default; sibling workers (e.g. cwk-contact-prod)
# override specific path prefixes via zone routes.
routes = [
  { pattern = "api.houseofcwk.com", custom_domain = true },
]

[env.production.vars]
ENVIRONMENT    = "production"
ALLOWED_ORIGIN = "https://houseofcwk.com"
FROM_EMAIL     = "hello@houseofcwk.com"
FROM_NAME      = "CWK. Experience"
REPLY_TO_EMAIL = "hello@houseofcwk.com"
REPLY_TO_NAME  = "Kris San — CWK."

[[env.production.kv_namespaces]]
binding = "WAITLIST"
id      = "c025d8eee2234c7abeab8cfdabfb7a9d"
